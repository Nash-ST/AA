name: Build Construction Documents

on:
  push:
    paths:
      - 'templates/**'
      - 'scripts/**'
      - 'skills/**'
      - 'plugin.json'
  pull_request:
    paths:
      - 'templates/**'
      - 'scripts/**'
      - 'skills/**'
      - 'plugin.json'
  workflow_dispatch:
    inputs:
      project_name:
        description: '工程名称'
        required: true
        default: '示例工程项目'
      doc_type:
        description: '文档类型'
        required: true
        type: choice
        options:
          - construction-plan
          - safety-disclosure
          - quality-inspection
          - supervision-report

jobs:
  validate:
    name: Validate Templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-docx markdown jinja2

      - name: Validate template syntax
        run: python scripts/validate-templates.py

      - name: Check template coverage
        run: |
          echo "Checking template coverage..."
          templates=$(find templates -name "*.md" | wc -l)
          echo "Total templates: $templates"
          if [ "$templates" -lt 1 ]; then
            echo "No templates found!"
            exit 1
          fi

  build-documents:
    name: Generate Sample Documents
    runs-on: windows-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-docx markdown jinja2

      - name: Generate construction plan
        run: python scripts/generate-sample.py --template templates/construction/construction-plan.md --output outputs/construction-plan.docx

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-documents
          path: outputs/
          retention-days: 30
